name: 'Argus'
description: 'AI-powered multi-agent code review — every PR, every team member, same standard.'

inputs:
  groq_api_key:
    description: 'Groq API key'
    required: true
  autofix:
    description: 'Automatically create a fix branch for critical issues'
    required: false
    default: 'false'
  language:
    description: 'Language for PR comments (en, tr, es, de...)'
    required: false
    default: 'en'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r ${{ github.action_path }}/requirements.txt
      shell: bash

    - name: Run AI pipeline
      run: python ${{ github.action_path }}/main.py
      shell: bash
      env:
        GROQ_API_KEY: ${{ inputs.groq_api_key }}
        GITHUB_TOKEN: ${{ github.token }}
        REPO_NAME: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.number }}
        USE_FAKE_DIFF: "false"
        AUTOFIX: ${{ inputs.autofix }}
        LANGUAGE: ${{ inputs.language }}